name: Documentation
description: Report a problem with the docs or suggest a documentation change
title: "[Docs]: "
labels: ["documentation"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve the docs! Use this for anything from a typo to missing or confusing documentation.

  - type: checkboxes
    id: preflight
    attributes:
      label: Before you start
      options:
        - label: I searched existing issues and didn't find a duplicate.
          required: true

  - type: dropdown
    id: location
    attributes:
      label: Where is the documentation?
      options:
        - README
        - CONTRIBUTING
        - Wiki
        - Package README (core / cli / starter / create-monoblogger)
        - Code comments
        - Other / not sure
    validations:
      required: true

  - type: dropdown
    id: kind
    attributes:
      label: Type of change
      options:
        - Typo or formatting
        - Incorrect or outdated information
        - Missing documentation
        - Clarification needed
        - New guide or example
    validations:
      required: true

  - type: input
    id: link
    attributes:
      label: Link or path
      description: Link to the page/section, or the file path (e.g. README.md, packages/core/...).
      placeholder: "https://github.com/Michimono/monoblogger/blob/main/README.md#getting-started"

  - type: textarea
    id: problem
    attributes:
      label: What's wrong or missing?
      description: Describe the issue with the current documentation.
    validations:
      required: true

  - type: textarea
    id: suggestion
    attributes:
      label: Suggested change
      description: How should it read instead? Proposed wording, examples, or an outline are all welcome.

  - type: checkboxes
    id: contribute
    attributes:
      label: Contribution
      options:
        - label: I'm willing to open a pull request for this change.
          required: false
