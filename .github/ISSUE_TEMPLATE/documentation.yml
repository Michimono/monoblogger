name: Documentation
description: Report a problem with the docs or suggest a documentation change
title: "[Docs]: "
labels: ["documentation"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve the docs! Use this for anything from a typo to missing or confusing documentation.

  - type: dropdown
    id: location
    attributes:
      label: Where is the documentation?
      options:
        - README
        - CONTRIBUTING
        - Wiki
        - Package README (core / cli / starter / create-monoblogger)
        - Code comments
        - Other / not sure
    validations:
      required: true

  - type: input
    id: link
    attributes:
      label: Link or path (optional)
      description: Link to the page/section, or the file path (e.g. README.md, packages/core/...).
      placeholder: "https://github.com/Michimono/monoblogger/blob/main/README.md#getting-started"

  - type: textarea
    id: problem
    attributes:
      label: What's the suggested change?
      description: Describe the issue with the current documentation and proposed wording, examples, or an outline are all welcome.
    validations:
      required: true

  - type: checkboxes
    id: contribute
    attributes:
      label: Contribution
      options:
        - label: I'm willing to open a pull request for this change.
          required: false
