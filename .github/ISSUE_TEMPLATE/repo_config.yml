name: Repo / config change
description: Propose changes to project configuration, tooling, or automation
title: "[Config]: "
labels: ["config"]
body:
  - type: markdown
    attributes:
      value: |
        Use this for changes to how the repo is built, tested, and maintained but not for app features or bugs.

  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: What should change, and what would the result look like?
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context (optional)
      description: Links, references to how other projects do it, or anything else relevant.

  - type: checkboxes
    id: contribute
    attributes:
      label: Contribution
      options:
        - label: I'm willing to open a pull request for this change.
          required: false
