name: Feature request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion! Please describe the problem you're trying to solve, not just the solution you have in mind.

  - type: checkboxes
    id: preflight
    attributes:
      label: Before you start
      options:
        - label: I searched existing issues and didn't find a similar request.
          required: true

  - type: dropdown
    id: package
    attributes:
      label: Related package
      options:
        - "@monoblogger/core"
        - "@monoblogger/cli"
        - "@monoblogger/starter"
        - create-monoblogger
        - "Project-wide / not sure"
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case or pain point. What are you trying to do that's hard or impossible today?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would you like it to work? Include example config, CLI commands, or template syntax if relevant.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or other approaches you've thought about.

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else, e.g. links, screenshots, or related Blogger documentation.
