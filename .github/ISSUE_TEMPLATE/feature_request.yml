name: Feature request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["feature"]
body:
  - type: markdown
    attributes:
      value: |
        Please describe the problem you're trying to solve, not just the solution you have in mind.

  - type: dropdown
    id: package
    attributes:
      label: Related package
      options:
        - "@monoblogger/core"
        - "@monoblogger/cli"
        - "@monoblogger/starter"
        - create-monoblogger
        - "Project-wide / not sure"
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case or pain point. What are you trying to do that's hard or impossible today?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would you like it to work? Include example config, CLI commands, or template syntax if relevant.
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context (optional)
      description: Anything else, e.g. links, screenshots, or related Blogger documentation.
